<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agenda Médica</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Tu CSS personalizado -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-light">
    <!-- Barra de Navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="#">Agenda Médica</a>
        <div class="d-flex">
          <button id="btnLogout" class="btn btn-danger d-none">
            Cerrar Sesión
          </button>
        </div>
      </div>
    </nav>

    <!-- Contenedor Principal -->
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <!-- Formulario de Login / Registro -->
          <div class="card shadow">
            <div class="card-body">
              <h3 class="text-center mb-4">Acceso Usuarios</h3>

              <form id="loginForm">
                <div class="mb-3">
                  <label>Email</label>
                  <input
                    type="email"
                    id="email"
                    class="form-control"
                    placeholder="tu@correo.com"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label>Contraseña</label>
                  <input
                    type="password"
                    id="password"
                    class="form-control"
                    placeholder="******"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  Ingresar
                </button>
              </form>

              <hr />

              <button id="btnGoogle" class="btn btn-outline-danger w-100">
                <img
                  src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                  width="20"
                />
                Continuar con Google
              </button>

              <p class="text-center mt-3">
                ¿No tienes cuenta?
                <a href="#" id="toggleRegister">Regístrate aquí</a>
              </p>
            </div>
          </div>

          <!-- Panel de Bienvenida (Oculto al inicio) -->
          <!-- Panel de Bienvenida (Visible solo cuando está logueado) -->
          <div id="welcomePanel" class="mt-4 d-none">
            <!-- Mensaje de Bienvenida -->
            <div class="card bg-success text-white mb-4">
              <div class="card-body text-center">
                <h2 id="welcomeMessage">Bienvenido</h2>
                <p id="userEmail">email@ejemplo.com</p>
              </div>
            </div>

            <div class="row">
              <!-- Columna Izquierda: Formulario de Nueva Cita -->
              <div class="col-md-6">
                <div class="card shadow">
                  <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">📅 Agendar Nueva Cita</h5>
                  </div>
                  <div class="card-body">
                    <form id="appointmentForm">
                      <div class="mb-3">
                        <label class="form-label">Doctor</label>
                        <select id="doctorSelect" class="form-select" required>
                          <option value="">Seleccione un doctor...</option>
                          <option value="Dr. Pérez - Cardiología">
                            Dr. Pérez - Cardiología
                          </option>
                          <option value="Dr. Gómez - Pediatría">
                            Dr. Gómez - Pediatría
                          </option>
                          <option value="Dra. López - Dermatología">
                            Dra. López - Dermatología
                          </option>
                          <option value="Dr. Ruiz - Medicina General">
                            Dr. Ruiz - Medicina General
                          </option>
                        </select>
                      </div>

                      <div class="mb-3">
                        <label class="form-label">Fecha</label>
                        <input
                          type="date"
                          id="appointmentDate"
                          class="form-control"
                          required
                        />
                      </div>

                      <div class="mb-3">
                        <label class="form-label">Hora</label>
                        <input
                          type="time"
                          id="appointmentTime"
                          class="form-control"
                          required
                        />
                      </div>

                      <div class="mb-3">
                        <label class="form-label">Motivo de la consulta</label>
                        <textarea
                          id="appointmentReason"
                          class="form-control"
                          rows="3"
                          placeholder="Ej: Dolor de cabeza, chequeo general..."
                          required
                        ></textarea>
                      </div>

                      <button type="submit" class="btn btn-primary w-100">
                        💾 Guardar Cita
                      </button>
                    </form>
                  </div>
                </div>
              </div>

              <!-- Columna Derecha: Lista de Citas -->
              <div class="col-md-6">
                <div class="card shadow">
                  <div class="card-header bg-info text-white">
                    <h5 class="mb-0">📋 Mis Citas Agendadas</h5>
                  </div>
                  <div class="card-body">
                    <div id="appointmentsList">
                      <p class="text-center text-muted">Cargando citas...</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
    // Establecer fecha mínima como hoy
    document.addEventListener('DOMContentLoaded', function() {
        const dateInput = document.getElementById('appointmentDate');
        if (dateInput) {
            const today = new Date().toISOString().split('T')[0];
            dateInput.setAttribute('min', today);
        }
    });
</script>
    <!-- Firebase SDKs (Versión Modular) -->
    <script type="module" src="app.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
