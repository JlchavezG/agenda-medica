<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Médica</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tu CSS personalizado -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <!-- Barra de Navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Agenda Médica</a>
            <div class="d-flex">
                <button id="btnLogout" class="btn btn-danger d-none">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <!-- Contenedor Principal -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                
                <!-- Formulario de Login / Registro -->
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="text-center mb-4">Acceso Usuarios</h3>
                        
                        <form id="loginForm">
                            <div class="mb-3">
                                <label>Email</label>
                                <input type="email" id="email" class="form-control" placeholder="tu@correo.com" required>
                            </div>
                            <div class="mb-3">
                                <label>Contraseña</label>
                                <input type="password" id="password" class="form-control" placeholder="******" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                        </form>

                        <hr>
                        
                        <button id="btnGoogle" class="btn btn-outline-danger w-100">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> 
                            Continuar con Google
                        </button>
                        
                        <p class="text-center mt-3">
                            ¿No tienes cuenta? <a href="#" id="toggleRegister">Regístrate aquí</a>
                        </p>
                    </div>
                </div>

                <!-- Panel de Bienvenida (Oculto al inicio) -->
                <div id="welcomePanel" class="card shadow mt-4 d-none">
                    <div class="card-body text-center">
                        <h2 id="welcomeMessage">Bienvenido</h2>
                        <p>Aquí irá el calendario de citas...</p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Firebase SDKs (Versión Modular) -->
    <script type="module" src="app.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
